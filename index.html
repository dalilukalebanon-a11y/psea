<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>اللمسات الآمنة واللمسات غير الآمنة</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
:root{--bg:#e9fbf8;--deep:#163e72;--green:#35b86b;--yellow:#f3b733;--red:#e54b4b;--blue:#4ba9ee;--ink:#17314f;--card:#fff;--soft:#f5fbff;--shadow:0 18px 45px rgba(20,70,120,.16);--radius:28px}
html,body{min-height:100%;font-family:Tajawal,system-ui,sans-serif;background:linear-gradient(180deg,#dff8ff 0%,#ecfff2 100%);color:var(--ink);overflow-x:hidden}
.screen{display:none;min-height:100vh;padding:18px 14px 28px;align-items:center;justify-content:center}.screen.active{display:flex}.app{width:min(520px,100%);margin:auto}.card{background:rgba(255,255,255,.94);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;border:6px solid rgba(255,255,255,.8)}
.hero{background:linear-gradient(145deg,#14528f,#0e8b57);color:#fff;text-align:center}.star{font-size:58px;display:inline-block;filter:drop-shadow(0 8px 12px rgba(0,0,0,.18));animation:bob 1.8s ease-in-out infinite}.title{font-size:clamp(28px,8vw,42px);font-weight:900;line-height:1.2;margin:8px 0}.sub{font-size:clamp(16px,4.6vw,20px);font-weight:800;opacity:.92;line-height:1.55}.codeInput{width:100%;margin:22px 0 12px;padding:18px 20px;border-radius:24px;border:4px solid #d5eefb;background:#fff;font-size:30px;font-weight:900;text-align:center;color:#17314f;font-family:Tajawal}.bigBtn{width:100%;border:none;border-radius:999px;background:linear-gradient(135deg,#ffd641,#f5a400);color:#3b2100;font-family:Tajawal;font-weight:900;font-size:28px;padding:18px 26px;box-shadow:0 12px 28px rgba(230,160,0,.28);cursor:pointer}.bigBtn:active{transform:scale(.96)}.smallHint{font-size:13px;font-weight:800;opacity:.78;line-height:1.5;margin-top:10px}.topbar{display:flex;align-items:center;gap:10px;margin-bottom:12px}.pill{background:#fff;border-radius:999px;padding:8px 14px;font-weight:900;box-shadow:0 4px 12px rgba(30,90,130,.08);font-size:14px}.progressWrap{flex:1;height:18px;background:#d7edf5;border-radius:999px;overflow:hidden;border:3px solid #fff;box-shadow:inset 0 2px 8px rgba(0,0,0,.08)}.progressFill{height:100%;width:0;background:linear-gradient(90deg,#35b86b,#ffd641);border-radius:999px;transition:width .45s cubic-bezier(.2,.9,.2,1)}
.videoBox{background:#fff;border-radius:26px;box-shadow:var(--shadow);padding:12px}.videoBox video{width:100%;border-radius:20px;background:#111;display:block;max-height:70vh}.videoMsg{text-align:center;font-weight:900;font-size:20px;margin:14px 0;color:#1c4c7b}.playGate{margin-top:12px}.disabled{opacity:.45;pointer-events:none;filter:grayscale(.4)}
.gameTitle{text-align:center;font-size:clamp(22px,6vw,32px);font-weight:900;color:#164672;line-height:1.2;margin:4px 0 2px}.gameSub{text-align:center;font-size:15px;font-weight:800;color:#5e7c98;margin-bottom:10px}.bodyStage{position:relative;background:linear-gradient(180deg,#fff 0%,#f8fdff 100%);border-radius:30px;box-shadow:var(--shadow);padding:10px 6px 4px;overflow:hidden}.bodySvg{width:100%;max-width:285px;margin:0 auto;display:block;overflow:visible}.partShape{fill:transparent;stroke:transparent;stroke-width:0;pointer-events:none}.partShape.active{stroke:#ffd12e;stroke-width:5;fill:rgba(255,209,46,.28);filter:drop-shadow(0 0 16px rgba(255,209,46,.95));animation:pulse 1s ease-in-out infinite}.partShape.teach{stroke:#2d7ff9;stroke-width:5;fill:rgba(45,127,249,.18);filter:drop-shadow(0 0 14px rgba(45,127,249,.55));animation:pulse .9s ease-in-out infinite}.feedbackOverlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transform:scale(.92);transition:.22s}.feedbackOverlay.show{opacity:1;transform:scale(1)}.feedbackBubble{min-width:190px;min-height:140px;border-radius:34px;background:rgba(255,255,255,.96);box-shadow:0 20px 55px rgba(0,0,0,.20);border:8px solid #35b86b;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}.feedbackBubble.protect{border-color:#2d7ff9}.feedbackIcon{font-size:72px;line-height:1}.feedbackMini{font-size:40px;line-height:1}
.guide{position:absolute;left:6px;bottom:4px;width:96px;height:136px;transform-origin:bottom center;transition:.25s;pointer-events:none}.guide svg{width:100%;height:100%;overflow:visible}.guide.happy{animation:guideBounce .48s ease}.guide.protect{animation:guideStep .55s ease}.guideHandNo{opacity:0;transform-origin:43px 59px}.guide.protect .guideHandNo{opacity:1;animation:noWave .52s ease-in-out 2}.guideThumb{opacity:0}.guide.happy .guideThumb{opacity:1}.faceMouth{transition:.2s}.guide.happy .faceMouth{d:path('M31 38 Q42 50 53 38')}.guide.protect .faceMouth{d:path('M31 46 Q42 38 53 46')}
.answers{display:flex;gap:12px;justify-content:center;margin:14px 0}.answerBtn{flex:1;max-width:132px;aspect-ratio:1/1;border-radius:28px;border:6px solid #fff;background:#fff;font-size:56px;box-shadow:0 10px 24px rgba(20,70,120,.14);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}.answerBtn:active{transform:scale(.92)}.answerBtn.pulseCorrect{animation:correctPulse .7s ease 2;border-color:#35b86b;background:#e5faee}.answerBtn:nth-child(1){border-bottom-color:#35b86b}.answerBtn:nth-child(2){border-bottom-color:#f3b733}.answerBtn:nth-child(3){border-bottom-color:#e54b4b}.doneCard{text-align:center}.doneIcon{font-size:80px;animation:bob 1.4s ease-in-out infinite}.logNote{display:none!important}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}@keyframes pulse{0%,100%{transform:scale(1);opacity:.75}50%{transform:scale(1.04);opacity:1}}@keyframes guideBounce{0%,100%{transform:translateY(0)}45%{transform:translateY(-10px)}}@keyframes guideStep{0%,100%{transform:translateX(0)}50%{transform:translateX(8px)}}@keyframes noWave{0%,100%{transform:rotate(0)}50%{transform:rotate(-18deg)}}@keyframes correctPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@media (max-width:420px){.card{padding:18px}.answerBtn{font-size:48px;border-radius:22px}.guide{width:82px;height:118px}.bodySvg{max-width:250px}.feedbackBubble{min-width:160px;min-height:120px}.feedbackIcon{font-size:60px}}
</style>
</head>
<body>
<section class="screen active" id="codeScreen"><div class="app"><div class="card hero"><div class="star">🛡️</div><h1 class="title">اللمسات الآمنة<br>واللمسات غير الآمنة</h1><p class="sub">أدخل الرمز لتبدأ</p><input id="codeInput" class="codeInput" autocomplete="off" inputmode="text" placeholder="الرمز"/><button class="bigBtn" id="startBtn">ابدأ ⭐</button><div class="smallHint">يقبل أي رمز مكتوب</div></div></div></section>
<section class="screen" id="videoScreen"><div class="app"><div class="topbar"><div class="pill">🎬</div><div class="progressWrap"><div class="progressFill" id="videoProgress"></div></div></div><div class="videoBox"><video id="pseaVideo" playsinline preload="metadata" controls poster=""><source src="psea_video.mp4" type="video/mp4"></video></div><div class="videoMsg" id="videoMsg">اضغط تشغيل وشاهد الفيديو</div><button class="bigBtn disabled" id="goGameBtn">العب الآن 🎮</button></div></section>
<section class="screen" id="gameScreen"><div class="app"><div class="topbar"><div class="pill">🛡️</div><div class="progressWrap"><div class="progressFill" id="bodyProgress"></div></div></div><h2 class="gameTitle">اللمسات الآمنة واللمسات غير الآمنة</h2><div class="gameSub">منطقة واحدة كل مرة</div><div class="bodyStage" id="bodyStage"><svg class="bodySvg" viewBox="0 0 220 390" xmlns="http://www.w3.org/2000/svg">
<ellipse cx="110" cy="380" rx="60" ry="8" fill="#b6dcb0" opacity=".5"/>
<path d="M74 258 Q69 303 71 346 Q74 363 86 363 Q97 363 98 346 Q98 305 94 258 Z" fill="#f9c59a"/><path d="M126 258 Q122 305 122 346 Q123 363 135 363 Q147 363 149 346 Q151 303 146 258 Z" fill="#f9c59a"/><ellipse cx="85" cy="361" rx="18" ry="10" fill="#2b64b0"/><ellipse cx="136" cy="361" rx="18" ry="10" fill="#2b64b0"/>
<path d="M62 158 Q56 200 57 246 Q58 265 68 274 Q88 282 110 282 Q132 282 152 274 Q162 265 163 246 Q164 200 158 158 Z" fill="#65bde8"/><path d="M89 158 Q110 187 131 158" stroke="#4da7d6" stroke-width="3" fill="none"/>
<path d="M60 165 Q42 177 37 211 Q34 238 49 245 Q63 250 69 235 Q71 205 60 165 Z" fill="#f9c59a"/><path d="M160 165 Q178 177 183 211 Q186 238 171 245 Q157 250 151 235 Q149 205 160 165 Z" fill="#f9c59a"/>
<path d="M49 241 Q40 260 43 280 Q45 292 58 292 Q70 292 72 280 Q73 259 65 244 Z" fill="#f9c59a"/><path d="M171 241 Q180 260 177 280 Q175 292 162 292 Q150 292 148 280 Q147 259 155 244 Z" fill="#f9c59a"/>
<ellipse cx="58" cy="296" rx="15" ry="12" fill="#f9c59a"/><ellipse cx="162" cy="296" rx="15" ry="12" fill="#f9c59a"/>
<rect x="96" y="141" width="28" height="28" rx="8" fill="#f9c59a"/><ellipse cx="110" cy="94" rx="56" ry="58" fill="#f9c59a"/><ellipse cx="54" cy="96" rx="10" ry="13" fill="#f3b486"/><ellipse cx="166" cy="96" rx="10" ry="13" fill="#f3b486"/>
<path d="M60 85 Q55 55 77 38 Q98 20 128 31 Q153 41 160 83 Q138 69 111 69 Q83 69 60 85 Z" fill="#6a3a18"/><path d="M76 40 Q104 24 134 41" stroke="#7b4720" stroke-width="10" stroke-linecap="round" opacity=".55"/>
<ellipse cx="91" cy="94" rx="12" ry="13" fill="#fff"/><ellipse cx="129" cy="94" rx="12" ry="13" fill="#fff"/><circle cx="91" cy="96" r="6" fill="#18324a"/><circle cx="129" cy="96" r="6" fill="#18324a"/><path d="M96 120 Q110 132 124 120" stroke="#c75b55" stroke-width="4" fill="none" stroke-linecap="round" id="mainMouth"/>
<ellipse id="part-hand-l" class="partShape" cx="58" cy="296" rx="24" ry="20"/><ellipse id="part-hand-r" class="partShape" cx="162" cy="296" rx="24" ry="20"/>
<ellipse id="part-shoulder-l" class="partShape" cx="63" cy="177" rx="24" ry="22"/><ellipse id="part-shoulder-r" class="partShape" cx="157" cy="177" rx="24" ry="22"/>
<ellipse id="part-arm-l" class="partShape" cx="51" cy="230" rx="22" ry="58"/><ellipse id="part-arm-r" class="partShape" cx="169" cy="230" rx="22" ry="58"/>
<ellipse id="part-hair" class="partShape" cx="110" cy="57" rx="56" ry="41"/><ellipse id="part-ear-l" class="partShape" cx="54" cy="96" rx="18" ry="22"/><ellipse id="part-ear-r" class="partShape" cx="166" cy="96" rx="18" ry="22"/>
<ellipse id="part-mouth" class="partShape" cx="110" cy="122" rx="30" ry="18"/><rect id="part-chest" class="partShape" x="72" y="166" width="76" height="55" rx="16"/><rect id="part-stomach" class="partShape" x="74" y="220" width="72" height="42" rx="15"/><rect id="part-private" class="partShape" x="82" y="263" width="56" height="35" rx="14"/>
</svg><div class="guide" id="guide"><svg viewBox="0 0 90 130"><ellipse cx="45" cy="123" rx="28" ry="6" fill="#91c791" opacity=".35"/><path d="M28 68 Q21 91 25 110" stroke="#f8bd8d" stroke-width="14" stroke-linecap="round"/><path d="M62 68 Q69 91 65 110" stroke="#f8bd8d" stroke-width="14" stroke-linecap="round"/><path d="M25 62 Q45 48 65 62 L70 112 Q45 121 20 112 Z" fill="#36b375"/><rect x="36" y="46" width="18" height="18" rx="6" fill="#f8bd8d"/><circle cx="45" cy="31" r="28" fill="#f8bd8d"/><path d="M20 28 Q21 10 45 7 Q70 10 71 28 Q58 19 45 19 Q31 19 20 28" fill="#5c3217"/><circle cx="35" cy="31" r="4" fill="#142033"/><circle cx="55" cy="31" r="4" fill="#142033"/><path class="faceMouth" d="M34 43 Q45 53 56 43" stroke="#9d3e38" stroke-width="3.5" fill="none" stroke-linecap="round"/><g class="guideThumb"><circle cx="15" cy="60" r="10" fill="#f8bd8d"/><path d="M14 54 L8 43" stroke="#f8bd8d" stroke-width="7" stroke-linecap="round"/></g><g class="guideHandNo"><path d="M15 62 Q9 48 18 39" stroke="#f8bd8d" stroke-width="9" stroke-linecap="round"/><path d="M11 48 L27 48" stroke="#e54b4b" stroke-width="5" stroke-linecap="round"/></g></svg></div><div class="feedbackOverlay" id="feedbackOverlay"><div class="feedbackBubble" id="feedbackBubble"><div class="feedbackIcon" id="feedbackIcon">👍</div><div class="feedbackMini" id="feedbackMini">✨</div></div></div></div><div class="answers"><button class="answerBtn" data-answer="green">😊</button><button class="answerBtn" data-answer="yellow">😐</button><button class="answerBtn" data-answer="red">😟</button></div></div></section>
<section class="screen" id="doneScreen"><div class="app"><div class="card doneCard"><div class="doneIcon">🎉</div><h1 class="title" style="color:#164672">خلصت اللعبة</h1><p class="sub" style="color:#416984">شكرًا لمشاركتك</p></div></div></section>
<script>
(function(){
'use strict';
const GOOGLE_SCRIPT_URL=''; // ضع رابط Google Apps Script هنا لاحقًا
let childCode='', sessionId='', bodyIndex=0, videoCompleted=false, startedAt=Date.now();
const logs=[];
const bodyParts=[
 {key:'hand', label:'Hand', expected:'green', ids:['part-hand-l','part-hand-r']},
 {key:'shoulder', label:'Shoulder', expected:'yellow', ids:['part-shoulder-l','part-shoulder-r']},
 {key:'arm', label:'Arm', expected:'yellow', ids:['part-arm-l','part-arm-r']},
 {key:'hair', label:'Hair', expected:'yellow', ids:['part-hair']},
 {key:'ear', label:'Ear', expected:'red', ids:['part-ear-l','part-ear-r']},
 {key:'mouth', label:'Mouth', expected:'red', ids:['part-mouth']},
 {key:'chest', label:'Chest', expected:'red', ids:['part-chest']},
 {key:'stomach', label:'Stomach', expected:'red', ids:['part-stomach']},
 {key:'private_area', label:'Private area', expected:'red', ids:['part-private']}
];
const screens={code:document.getElementById('codeScreen'), video:document.getElementById('videoScreen'), game:document.getElementById('gameScreen'), done:document.getElementById('doneScreen')};
const codeInput=document.getElementById('codeInput'), startBtn=document.getElementById('startBtn'), video=document.getElementById('pseaVideo'), videoProgress=document.getElementById('videoProgress'), goGameBtn=document.getElementById('goGameBtn'), videoMsg=document.getElementById('videoMsg'), bodyProgress=document.getElementById('bodyProgress'), feedbackOverlay=document.getElementById('feedbackOverlay'), feedbackBubble=document.getElementById('feedbackBubble'), feedbackIcon=document.getElementById('feedbackIcon'), feedbackMini=document.getElementById('feedbackMini'), guide=document.getElementById('guide'), mainMouth=document.getElementById('mainMouth');
function show(name){Object.values(screens).forEach(s=>s.classList.remove('active'));screens[name].classList.add('active');}
function uid(){return 's_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8)}
function nowIso(){return new Date().toISOString()}
function log(eventType,data){const row=Object.assign({timestamp:nowIso(),session_id:sessionId,child_code:childCode,event_type:eventType,game_version:'v2_video_body'},data||{});logs.push(row); if(GOOGLE_SCRIPT_URL){try{fetch(GOOGLE_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(row)}).catch(()=>{});}catch(e){}}}
let audioCtx=null;function audio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended')audioCtx.resume(); return audioCtx;}
function tone(freq,dur,type='sine',gain=.12,delay=0){const ctx=audio();const o=ctx.createOscillator();const g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0,ctx.currentTime+delay);g.gain.linearRampToValueAtTime(gain,ctx.currentTime+delay+.02);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+delay+dur);o.connect(g);g.connect(ctx.destination);o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+dur+.03)}
function sound(kind){try{if(kind==='ok'){tone(523,.12,'sine',.10);tone(784,.16,'sine',.09,.09);tone(1046,.16,'sine',.07,.18);}else if(kind==='protect'){tone(220,.14,'triangle',.10);tone(330,.16,'triangle',.08,.13);}else if(kind==='focus'){tone(880,.08,'sine',.055);}}catch(e){}}
function bind(el,fn){el.addEventListener('click',fn);el.addEventListener('touchstart',function(e){e.preventDefault();fn(e)},{passive:false});}
bind(startBtn,()=>{childCode=(codeInput.value||'').trim()||'بدون رمز'; sessionId=uid(); startedAt=Date.now(); sound('ok'); log('session_start',{phase:'code'}); show('video');});
video.addEventListener('play',()=>{sound('focus');log('video_started',{video_current_time:Math.round(video.currentTime||0)});});
video.addEventListener('timeupdate',()=>{const p=video.duration?Math.min(100,(video.currentTime/video.duration)*100):0; videoProgress.style.width=p+'%'; if(p>=95&&!videoCompleted){videoCompleted=true;goGameBtn.classList.remove('disabled');videoMsg.textContent='';log('video_completed',{watched_seconds:Math.round(video.currentTime),video_duration:Math.round(video.duration||0),watched_percent:Math.round(p)});sound('ok');}});
video.addEventListener('ended',()=>{if(!videoCompleted){videoCompleted=true;goGameBtn.classList.remove('disabled');videoProgress.style.width='100%';videoMsg.textContent='';log('video_completed',{watched_seconds:Math.round(video.currentTime),video_duration:Math.round(video.duration||0),watched_percent:100});sound('ok');}});
bind(goGameBtn,()=>{if(!videoCompleted)return;log('body_game_start',{});show('game');setTimeout(startPart,350);});
function clearParts(){document.querySelectorAll('.partShape').forEach(p=>p.classList.remove('active','teach'));}
function setFace(kind){if(kind==='happy')mainMouth.setAttribute('d','M96 119 Q110 134 124 119'); else if(kind==='protect')mainMouth.setAttribute('d','M96 128 Q110 119 124 128'); else mainMouth.setAttribute('d','M96 120 Q110 132 124 120');}
function startPart(){clearParts();feedbackOverlay.classList.remove('show');guide.className='guide';setFace('neutral'); if(bodyIndex>=bodyParts.length){finishGame();return;} const part=bodyParts[bodyIndex]; part.ids.forEach(id=>{const el=document.getElementById(id); if(el)el.classList.add('active');}); bodyProgress.style.width=(bodyIndex/bodyParts.length*100)+'%'; sound('focus');}
function teachCorrect(part){clearParts();part.ids.forEach(id=>{const el=document.getElementById(id); if(el)el.classList.add('teach');});document.querySelectorAll('.answerBtn').forEach(b=>b.classList.remove('pulseCorrect'));const correct=document.querySelector('.answerBtn[data-answer="'+part.expected+'"]'); if(correct) correct.classList.add('pulseCorrect');}
function visualFeedback(mode,part){guide.className='guide '+(mode==='ok'?'happy':'protect');setFace(mode==='ok'?'happy':'protect');feedbackBubble.className='feedbackBubble '+(mode==='ok'?'':'protect');feedbackIcon.textContent=mode==='ok'?'👍':'🛡️';feedbackMini.textContent=mode==='ok'?'✨':'✋';feedbackOverlay.classList.add('show');sound(mode==='ok'?'ok':'protect'); if(mode!=='ok')teachCorrect(part);}
document.querySelectorAll('.answerBtn').forEach(btn=>bind(btn,()=>{if(bodyIndex>=bodyParts.length)return;const part=bodyParts[bodyIndex];const ans=btn.dataset.answer;const expected=part.expected;const exact=ans===expected;const protective=ans==='red';let mode='ok'; if(!exact && !protective) mode='protect'; if(!exact && protective) mode='ok'; log('body_response',{body_part:part.key,body_part_label:part.label,response:ans,expected_response:expected,exact_match:exact,protective_response:protective,step_number:bodyIndex+1}); visualFeedback(mode,part); bodyIndex++; bodyProgress.style.width=(bodyIndex/bodyParts.length*100)+'%'; setTimeout(()=>{document.querySelectorAll('.answerBtn').forEach(b=>b.classList.remove('pulseCorrect'));clearParts();feedbackOverlay.classList.remove('show');guide.className='guide';setFace('neutral');setTimeout(startPart,250);}, mode==='ok'?900:1500); }));
function finishGame(){bodyProgress.style.width='100%'; const exactMatches=logs.filter(x=>x.event_type==='body_response'&&x.session_id===sessionId&&x.exact_match).length; const protective=logs.filter(x=>x.event_type==='body_response'&&x.session_id===sessionId&&x.protective_response).length; const score=Math.round((exactMatches/bodyParts.length)*100); log('body_game_completed',{exact_matches:exactMatches,total_items:bodyParts.length,body_score:score,protective_count:protective,completed:true,total_seconds:Math.round((Date.now()-startedAt)/1000)}); sound('ok');show('done');}
})();
</script>
</body>
</html>
